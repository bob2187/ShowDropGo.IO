---
# showdropgo-macos-apps: Install apps for Unity Intercom server host
# Homebrew packages
- name: Install Homebrew formulae
  community.general.homebrew:
    name:
      - tailscale      # managed by tailscale-macos role, listed here for reference
      - cloudflared    # Cloudflare Tunnel
      - node           # required for Claude Code
    state: present
  environment:
    HOMEBREW_NO_AUTO_UPDATE: "1"
    HOMEBREW_NO_ENV_HINTS: "1"
  become: false

- name: Install Homebrew casks
  community.general.homebrew_cask:
    name:
      - google-chrome
      - sonobus
      - loopback
      # NOTE: Amphetamine is Mac App Store only — install manually:
      #   https://apps.apple.com/us/app/amphetamine/id937984704
    state: present
    install_options: "adopt"
  environment:
    HOMEBREW_NO_AUTO_UPDATE: "1"
    HOMEBREW_NO_ENV_HINTS: "1"
  become: false

# Stored PKG installers (licensed/commercial apps)
# Place installer files in roles/showdropgo-macos-apps/files/
# - unity-intercom.pkg
# - dante-virtual-soundcard.pkg
# - dante-via.pkg
- name: Check for stored PKG installers
  local_action: stat path="{{ role_path }}/files/{{ item }}"
  register: pkg_files
  loop:
    - unity-intercom.pkg
    - dante-virtual-soundcard.pkg
    - dante-via.pkg
  become: false

- name: Copy PKG installers to host
  copy:
    src: "{{ item.item }}"
    dest: "/tmp/{{ item.item }}"
    mode: '0644'
  loop: "{{ pkg_files.results }}"
  when: item.stat.exists
  become: false

- name: Install PKG installers
  command: installer -pkg /tmp/{{ item.item }} -target /
  loop: "{{ pkg_files.results }}"
  when: item.stat.exists
  become: true

# Claude Code CLI
- name: Install Claude Code globally
  community.general.npm:
    name: "@anthropic-ai/claude-code"
    global: true
    state: present
  become: false

# Ensure macOS built-in Screen Sharing (VNC) is enabled on port 5900
- name: Enable macOS Screen Sharing
  command: launchctl enable system/com.apple.screensharing
  become: true
  ignore_errors: true

- name: Start macOS Screen Sharing
  command: launchctl bootstrap system /System/Library/LaunchDaemons/com.apple.screensharing.plist
  become: true
  ignore_errors: true
