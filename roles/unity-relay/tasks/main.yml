---
# Unity Intercom relay role: Configure port forwarding to Mac Mini via Tailscale

- name: Install iptables-persistent
  apt:
    name:
      - iptables
      - iptables-persistent
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Enable IP forwarding in sysctl
  sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes
  when: unity_relay_ip_forward | default(true)

- name: Remove any existing DNAT rules for managed ports
  shell: |
    for port in {{ unity_relay_ports | join(' ') }}; do
      iptables -t nat -S PREROUTING | grep "dpt:$port" | grep DNAT | sed 's/-A/-D/' | while read rule; do
        iptables -t nat $rule
      done
    done
  changed_when: false
  failed_when: false

- name: Configure DNAT rules for Unity Intercom (TCP)
  iptables:
    table: nat
    chain: PREROUTING
    protocol: tcp
    destination_port: "{{ item }}"
    jump: DNAT
    to_destination: "{{ unity_relay_target_ip }}:{{ unity_relay_target_port | default(item) }}"
    state: present
  loop: "{{ unity_relay_ports }}"
  notify: Save iptables rules

- name: Configure DNAT rules for Unity Intercom (UDP)
  iptables:
    table: nat
    chain: PREROUTING
    protocol: udp
    destination_port: "{{ item }}"
    jump: DNAT
    to_destination: "{{ unity_relay_target_ip }}:{{ unity_relay_target_port | default(item) }}"
    state: present
  loop: "{{ unity_relay_ports }}"
  notify: Save iptables rules

- name: Ensure MASQUERADE rule exists
  iptables:
    table: nat
    chain: POSTROUTING
    jump: MASQUERADE
    state: present
  notify: Save iptables rules

- name: Display forwarding configuration
  debug:
    msg: "Forwarding ports {{ unity_relay_ports | join(', ') }} (TCP/UDP) to {{ unity_relay_target_ip }}:{{ unity_relay_target_port | default('same port') }}"
