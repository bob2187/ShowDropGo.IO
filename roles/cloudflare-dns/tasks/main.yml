---
# cloudflare-dns: Manage DNS records for showdropgo.io

- name: Update DNS records
  no_log: true
  community.general.cloudflare_dns:
    zone: "{{ cloudflare_zone }}"
    record: "{{ item.record }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
    api_token: "{{ cloudflare_api_token }}"
    proxied: "{{ item.proxied | default(false) }}"
    state: present
  loop: "{{ cloudflare_dns_records }}"

- name: Find stale DNS record IDs
  no_log: true
  uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records?type={{ item.type }}&name={{ item.record }}.{{ cloudflare_zone }}&content={{ item.value }}"
    method: GET
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
    status_code: 200
  loop: "{{ cloudflare_dns_records_absent | default([]) }}"
  register: stale_records

- name: Delete stale DNS records
  no_log: true
  uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records/{{ item.json.result[0].id }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
    status_code: 200
  loop: "{{ stale_records.results }}"
  when: item.json.result | length > 0

- name: Display DNS update summary
  debug:
    msg: "{{ item.record }}.{{ cloudflare_zone }} → {{ item.value }}"
  loop: "{{ cloudflare_dns_records }}"
